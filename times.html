<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/MaximusGugu/lista-queeridas/refs/heads/main/apple-touch-icon.png" />
    <title>Queeridas - Balanceador</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/MaximusGugu/lista-queeridas/refs/heads/main/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="standalone-navigation.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body class="theme-todes">
    <header class="header-compact">
        <div class="container center-header">
            <h1 id="tituloApp">⭐ BALANCEADOR DE TIMES QUEERIDAS⭐</h1>
        </div>
    </header>

    <main class="container teams-page">
        <div id="loadingSpinner" class="spinner-container">
            <div class="spinner"></div>
            <p class="loading-text">BUSCANDO DADOS...</p>
        </div>

        <div class="action-bar action-bar-primary">
            <button id="btnOpenImport" class="btn btn-main">+ COLAR LISTA DE JOGADORES</button>
        </div>

        <div id="areaRating" class="list-container"></div>

        <div class="config-row" id="areaConfigTimes" style="display:none;">
            <label class="label-instrucao">Usar Notas de:</label>
            <div class="nota-selector" id="notaTipoSelector">
                <div class="nota-option active" data-tipo="notaTodes">Todes</div>
                <div class="nota-option" data-tipo="notaElax">Elax</div>
                <div class="nota-option" data-tipo="notaAllStars">All Stars</div>
            </div>

            <div class="config-actions-row">
                <select id="qtdTimes" class="flex-1">
                    <option value="2">2 Times</option>
                    <option value="3" selected>3 Times</option>
                    <option value="4">4 Times</option>
                    <option value="5">5 Times</option>
                </select>
                <button id="btnGerarTimes" class="btn btn-main btn-flex-2 btn-gerar-times">RESSORTEAR</button>
            </div>
        </div>

        <div id="areaTeams"></div>

        <div class="action-bar action-bar-footer" id="areaAcoesFinal" style="display:none;">
            <button id="btnCopyTimes" class="btn btn-sub">COPIAR RESULTADO</button>
            <button id="btnLimpar" class="btn btn-sub danger">LIMPAR TUDO</button>
        </div>
    </main>

    <div id="modalImport" class="modal-overlay" style="display:none;">
        <div class="modal-content modal-import-content">
            <h3>Importar do WhatsApp</h3>
            <textarea id="textoTimesBulk" class="import-textarea" placeholder="1- Nome ✅ nota..."></textarea>
            <div class="modal-buttons">
                <button id="btnConfirmarImport" class="btn btn-main">PROCESSAR</button>
                <button class="btn btn-sub" onclick="fecharModal('modalImport')">CANCELAR</button>
            </div>
        </div>
    </div>

    <script src="load-navbar.js"></script>
    <script type="module" src="times.js"></script>
</body>
</html>
