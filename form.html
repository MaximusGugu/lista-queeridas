<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/MaximusGugu/lista-queeridas/refs/heads/main/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/MaximusGugu/lista-queeridas/refs/heads/main/favicon.png" />
    <title>Inscrição - Queeridas Volleyball</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260723-1">
    <script src="standalone-navigation.js" defer></script>
</head>
<body class="public-form-page">
    <div class="form-container">
        <img src="https://raw.githubusercontent.com/MaximusGugu/lista-queeridas/refs/heads/main/banner_padrao.webp" alt="Banner Queeridas" class="banner" id="imgBanner" fetchpriority="high" decoding="async">
        
        <div id="corpoForm">
            <div class="header-info">
                <div id="tagStatus" class="status-tag">CARREGANDO...</div>
                <h1 id="txtTitulo">...</h1>
                
                <div class="grid-info">
                    <div class="info-item">
                        <div class="info-label">📅 <span id="txtData">...</span></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🕒 <span id="txtHora">...</span></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">📍 <span id="txtLocal">...</span></div>
                        <!-- LINK DO MAPA APARECE AQUI SE EXISTIR -->
                        <a id="lnkMapa" href="#" target="_blank" class="maps-link" style="display:none;">(Como chegar?)</a>
                    </div>
                    <div class="info-item">
                        <div class="info-label payment-info">💰 <span id="txtValor">...</span></div>
                    </div>
                </div>

                <div class="footer-text" id="txtDescricao">...</div>
            </div>

            <div id="msgListaFechada" class="closed-message"></div>

            <div class="form-body" id="formBody">
                <div id="publicAuthGate" class="public-auth-gate hidden">
                    <h2>Entre para se inscrever</h2>
                    <p>Use sua conta Google. Você continuará conectado neste navegador nas próximas inscrições.</p>
                    <button id="btnPublicGoogleLogin" class="btn-google-login" type="button">
                        <span class="google-mark" aria-hidden="true">G</span>
                        <span>Continuar com Google</span>
                    </button>
                    <p id="publicAuthMessage" class="login-message hidden" role="alert"></p>
                </div>

                <form id="formInscricao" class="hidden">
                    <div class="campo">
                        <label>Nome Completo:</label>
                        <input type="text" id="iptNome" class="input-text" placeholder="Qual seu nome no WhatsApp" required>
                    </div>
                    <div class="campo">
                        <label>E-mail:</label>
                        <div class="public-account-row">
                            <input type="email" id="iptEmail" class="input-text public-email-input" readonly aria-readonly="true">
                            <button id="btnSwitchPublicAccount" class="btn-link-subtle public-switch-account" type="button">Trocar conta</button>
                        </div>
                    </div>
                    <button type="submit" id="btnSubmit" class="btn-enviar">ENVIAR MINHA INSCRIÇÃO</button>
                </form>
            </div>
        </div>

        <div id="sucesso" class="success-screen">
            <div class="success-icon">✅</div>
            <h2 class="success-title" id="successTitle">Inscrição Confirmada!</h2>
            <p class="success-text" id="successText">Agradecemos sua inscrição.</p>
            <button onclick="location.reload()" class="btn-link-subtle mt-30">Fazer outra inscrição</button>
        </div>
    </div>

    <script type="module">
        import { auth, authPersistenceReady, collection, db, doc, GoogleAuthProvider, onAuthStateChanged, onSnapshot, runTransaction, serverTimestamp, signInWithPopup, signOut } from "./firebase-config.js";

        const params = new URLSearchParams(window.location.search);
        const identificadorPublico = params.get('lista') || '';
        let idLista = null;
        let formularioAtual = null;
        let authResolvido = false;
        let dadosConfirmados = false;
        let cacheExibido = false;
        const formularioRef = identificadorPublico ? doc(db, "formularios_publicos", identificadorPublico) : null;
        const LINK_GRUPO_PADRAO = "https://chat.whatsapp.com/JWHNWnWC8N5IFrpNEwEtii";
        const BANNER_PADRAO_URL = "https://raw.githubusercontent.com/MaximusGugu/lista-queeridas/refs/heads/main/banner_padrao.webp";
        const DIAS_ANTES_ABERTURA_PADRAO = 1;
        const HORARIO_ABERTURA_PADRAO = "12h30";
        const CACHE_FORM_PREFIXO = "queeridas_form_publico_cache_v1:";
        const CACHE_FORM_VALIDADE_MS = 7 * 24 * 60 * 60 * 1000;
        const TIMEOUT_CONFIRMACAO_MS = 12000;
        const CAMPOS_PUBLICOS_CACHE = [
            "nomeJogo", "data", "dia", "inicio", "fim", "quadra", "valorTexto",
            "textoApoio", "mapaLink", "grupoLink", "abreDiasAntes", "abreHorario"
        ];
        const authGate = document.getElementById('publicAuthGate');
        const authMessage = document.getElementById('publicAuthMessage');
        const formInscricao = document.getElementById('formInscricao');
        const inputEmail = document.getElementById('iptEmail');
        const btnGoogle = document.getElementById('btnPublicGoogleLogin');
        const btnTrocarConta = document.getElementById('btnSwitchPublicAccount');
        let loginEmAndamento = false;

        function chaveCacheFormulario() {
            return identificadorPublico ? `${CACHE_FORM_PREFIXO}${identificadorPublico}` : "";
        }

        function limparCacheFormulario() {
            const chave = chaveCacheFormulario();
            if (!chave) return;
            try {
                localStorage.removeItem(chave);
            } catch (error) {
                console.warn("Não foi possível limpar o cache do formulário:", error);
            }
        }

        function carregarCacheFormulario() {
            const chave = chaveCacheFormulario();
            if (!chave) return null;
            try {
                const salvo = JSON.parse(localStorage.getItem(chave) || "null");
                const expirado = !salvo?.salvoEm
                    || Date.now() - Number(salvo.salvoEm) > CACHE_FORM_VALIDADE_MS;
                const dadosValidos = salvo?.dados
                    && typeof salvo.dados === "object"
                    && typeof salvo.dados.nomeJogo === "string";
                if (expirado || !dadosValidos) {
                    localStorage.removeItem(chave);
                    return null;
                }
                return salvo.dados;
            } catch (error) {
                console.warn("Não foi possível ler o cache do formulário:", error);
                limparCacheFormulario();
                return null;
            }
        }

        function extrairDadosPublicosCache(cfg) {
            return CAMPOS_PUBLICOS_CACHE.reduce((dados, campo) => {
                if (cfg[campo] !== undefined && cfg[campo] !== null) dados[campo] = cfg[campo];
                return dados;
            }, {});
        }

        function salvarCacheFormulario(cfg) {
            const chave = chaveCacheFormulario();
            if (!chave) return;
            try {
                const dados = extrairDadosPublicosCache(cfg);
                const anterior = JSON.parse(localStorage.getItem(chave) || "null");
                if (anterior?.dados && JSON.stringify(anterior.dados) === JSON.stringify(dados)) return;
                localStorage.setItem(chave, JSON.stringify({ salvoEm: Date.now(), dados }));
            } catch (error) {
                console.warn("Não foi possível atualizar o cache do formulário:", error);
            }
        }

        function usuarioGoogleValido(user) {
            return !!user
                && !user.isAnonymous
                && !!user.email
                && user.emailVerified
                && (user.providerData || []).some(provider => provider.providerId === 'google.com');
        }

        function mostrarMensagemAuth(texto) {
            authMessage.textContent = texto || '';
            authMessage.className = `login-message ${texto ? 'is-erro' : 'hidden'}`;
        }

        function mensagemErroGoogle(error) {
            if (error?.code === 'auth/popup-closed-by-user') return 'Login cancelado. Tente novamente.';
            if (error?.code === 'auth/popup-blocked') return 'O navegador bloqueou a janela do Google. Permita pop-ups e tente novamente.';
            if (error?.code === 'auth/cancelled-popup-request') return 'Já existe uma tentativa de login aberta.';
            if (error?.code === 'auth/network-request-failed') return 'Sem conexão com o Google. Verifique sua internet.';
            return 'Não foi possível entrar com o Google.';
        }

        function atualizarEstadoAutenticacao(user = auth.currentUser) {
            const autenticado = usuarioGoogleValido(user);
            const formularioAberto = dadosConfirmados
                && authResolvido
                && !!formularioAtual?.aberto;
            authGate.classList.toggle('hidden', !formularioAberto || autenticado);
            formInscricao.classList.toggle('hidden', !formularioAberto || !autenticado);
            inputEmail.value = formularioAberto && autenticado ? user.email : '';
        }

        async function entrarComGoogle() {
            if (loginEmAndamento) return;
            loginEmAndamento = true;
            btnGoogle.disabled = true;
            btnTrocarConta.disabled = true;
            mostrarMensagemAuth('');
            try {
                await authPersistenceReady;
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                const resultado = await signInWithPopup(auth, provider);
                if (!usuarioGoogleValido(resultado.user)) throw new Error('CONTA_GOOGLE_INVALIDA');
                atualizarEstadoAutenticacao(resultado.user);
            } catch (error) {
                console.error('Falha no login Google do formulário:', error);
                mostrarMensagemAuth(mensagemErroGoogle(error));
            } finally {
                loginEmAndamento = false;
                btnGoogle.disabled = false;
                btnTrocarConta.disabled = false;
            }
        }

        btnGoogle.onclick = entrarComGoogle;
        btnTrocarConta.onclick = entrarComGoogle;
        onAuthStateChanged(auth, user => atualizarEstadoAutenticacao(user));

        function iniciarFormularioPublico() {
            if (!formularioRef) {
                renderLinkInvalido();
                return;
            }

            const cache = carregarCacheFormulario();
            if (cache) {
                cacheExibido = true;
                renderFormProvisorio(cache);
            }

            const timerConfirmacao = window.setTimeout(() => {
                if (!dadosConfirmados) renderFalhaAtualizacao();
            }, TIMEOUT_CONFIRMACAO_MS);

            onSnapshot(formularioRef, { includeMetadataChanges: true }, (snap) => {
                if (snap.metadata.fromCache) {
                    if (!dadosConfirmados && snap.exists() && snap.data().vigente) {
                        cacheExibido = true;
                        renderFormProvisorio(extrairDadosPublicosCache(snap.data()));
                    }
                    return;
                }

                window.clearTimeout(timerConfirmacao);
                if (!snap.exists() || !snap.data().vigente) {
                    renderLinkInvalido();
                    return;
                }
                dadosConfirmados = true;
                formularioAtual = snap.data();
                idLista = formularioAtual.listaId;
                salvarCacheFormulario(formularioAtual);
                cacheExibido = true;
                renderForm(formularioAtual);
                atualizarEstadoAutenticacao();
            }, error => {
                window.clearTimeout(timerConfirmacao);
                console.error("Falha ao carregar formulário público:", error);
                renderFalhaAtualizacao();
            });
        }

        async function iniciarAutenticacaoPublica() {
            try {
                await authPersistenceReady;
                if (typeof auth.authStateReady === "function") await auth.authStateReady();
                if (auth.currentUser?.isAnonymous) await signOut(auth);
            } catch (error) {
                console.error("Falha na autenticação pública:", error);
                mostrarMensagemAuth("Não foi possível restaurar seu login. Tente entrar com o Google.");
            } finally {
                authResolvido = true;
                atualizarEstadoAutenticacao();
            }
        }

        iniciarFormularioPublico();
        iniciarAutenticacaoPublica();

        function renderLinkInvalido(texto = "Peça à organização o link atual do formulário.") {
            formularioAtual = null;
            dadosConfirmados = true;
            cacheExibido = false;
            limparCacheFormulario();
            document.getElementById('tagStatus').innerText = "● LINK EXPIRADO";
            document.getElementById('tagStatus').className = "status-tag tag-fechado";
            document.getElementById('txtTitulo').innerText = "Este link não está mais disponível";
            document.querySelector('.grid-info').style.display = 'none';
            document.getElementById('txtDescricao').innerText = '';
            document.getElementById('formBody').style.display = 'none';
            const mensagem = document.getElementById('msgListaFechada');
            mensagem.style.display = 'block';
            mensagem.innerText = texto;
            atualizarEstadoAutenticacao();
        }

        function preencherDadosFormulario(cfg) {
            document.querySelector('.grid-info').style.display = 'grid';
            document.getElementById('txtTitulo').innerText = cfg.nomeJogo || "";
            document.getElementById('txtData').innerText = `${cfg.data || ""}${cfg.dia ? ` (${cfg.dia})` : ""}`;
            document.getElementById('txtHora').innerText = cfg.inicio && cfg.fim
                ? `${cfg.inicio} às ${cfg.fim}`
                : cfg.inicio || cfg.fim || "";
            document.getElementById('txtLocal').innerText = cfg.quadra || "";
            document.getElementById('txtValor').innerText = cfg.valorTexto || "";
            document.getElementById('txtDescricao').innerText = cfg.textoApoio || "";

            const lnkMapa = document.getElementById('lnkMapa');
            if (typeof cfg.mapaLink === "string" && cfg.mapaLink.trim() !== "") {
                lnkMapa.href = cfg.mapaLink;
                lnkMapa.style.display = "block";
            } else {
                lnkMapa.style.display = "none";
            }

            document.getElementById('imgBanner').src = BANNER_PADRAO_URL;
        }

        function renderFormProvisorio(cfg) {
            preencherDadosFormulario(cfg);
            const tag = document.getElementById('tagStatus');
            tag.innerText = "● ATUALIZANDO...";
            tag.className = "status-tag tag-atualizando";
            document.getElementById('formBody').style.display = "none";
            document.getElementById('msgListaFechada').style.display = "none";
            atualizarEstadoAutenticacao();
        }

        function renderFalhaAtualizacao() {
            formularioAtual = null;
            dadosConfirmados = false;
            const tag = document.getElementById('tagStatus');
            tag.innerText = "● SEM CONEXÃO";
            tag.className = "status-tag tag-fechado";
            document.getElementById('formBody').style.display = "none";

            if (!cacheExibido) {
                document.getElementById('txtTitulo').innerText = "Não foi possível carregar o formulário";
                document.querySelector('.grid-info').style.display = 'none';
                document.getElementById('txtDescricao').innerText = '';
            }

            const mensagem = document.getElementById('msgListaFechada');
            mensagem.style.display = 'block';
            mensagem.innerText = "Não foi possível confirmar os dados atuais. Verifique sua conexão e recarregue a página.";
            atualizarEstadoAutenticacao();
        }

        function renderForm(cfg) {
            preencherDadosFormulario(cfg);

            const tag = document.getElementById('tagStatus');
            const btn = document.getElementById('btnSubmit');
            const formBody = document.getElementById('formBody');
            const msgListaFechada = document.getElementById('msgListaFechada');

            if (cfg.aberto) {
                tag.innerText = "● INSCRIÇÕES ABERTAS";
                tag.className = "status-tag tag-aberto";
                btn.disabled = false;
                btn.innerText = "ENVIAR";
                formBody.style.display = "block";
                msgListaFechada.style.display = "none";
            } else {
                tag.innerText = "● INSCRIÇÕES FECHADAS";
                tag.className = "status-tag tag-fechado";
                btn.disabled = true;
                btn.innerText = "ESTA LISTA ESTÁ FECHADA";
                formBody.style.display = "none";
                msgListaFechada.style.display = "block";
                msgListaFechada.innerHTML = montarMensagemListaFechada(cfg);
            }
        }

        function montarMensagemListaFechada(cfg) {
            const abertura = calcularAberturaLista(cfg);
            const grupoLink = cfg.grupoLink || LINK_GRUPO_PADRAO;
            return `Esta lista fechou. A próxima lista abre no dia <strong>${abertura.data}</strong> (${abertura.diaSemana}) às <strong>${abertura.horario}</strong>! Fique atento no grupo do WhatsApp. Caso ainda não faça parte, <a href="${grupoLink}" target="_blank" rel="noopener noreferrer">clique aqui</a> e participe.`;
        }

        function calcularAberturaLista(cfg) {
            const diasAntes = Number.isFinite(Number(cfg.abreDiasAntes)) ? Number(cfg.abreDiasAntes) : DIAS_ANTES_ABERTURA_PADRAO;
            const horario = cfg.abreHorario || HORARIO_ABERTURA_PADRAO;
            const dataEvento = obterDataEvento(cfg);
            let dataAbertura = new Date(dataEvento);
            dataAbertura.setDate(dataAbertura.getDate() - diasAntes);

            const agora = new Date();
            let tentativas = 0;
            while (combinarDataEHorario(dataAbertura, horario) <= agora && tentativas < 10) {
                dataAbertura.setDate(dataAbertura.getDate() + 7);
                tentativas++;
            }

            return {
                data: formatarDataCurta(dataAbertura),
                diaSemana: formatarDiaSemana(dataAbertura),
                horario
            };
        }

        function obterDataEvento(cfg) {
            const partes = /^(\d{2})\/(\d{2})$/.exec((cfg.data || "").trim());
            if (partes) {
                const data = new Date(new Date().getFullYear(), Number(partes[2]) - 1, Number(partes[1]));
                const hoje = new Date();
                hoje.setHours(0, 0, 0, 0);
                if (data >= hoje) return data;
            }

            const mapaDias = { "Domingo": 0, "Segunda-Feira": 1, "Terça-Feira": 2, "Quarta-Feira": 3, "Quinta-Feira": 4, "Sexta-Feira": 5, "Sábado": 6 };
            const hoje = new Date();
            const alvo = mapaDias[cfg.dia] ?? hoje.getDay();
            const diferenca = (alvo - hoje.getDay() + 7) % 7;
            const data = new Date(hoje);
            data.setDate(hoje.getDate() + diferenca);
            return data;
        }

        function combinarDataEHorario(data, horario) {
            const resultado = new Date(data);
            const partes = /^(\d{1,2})(?:h|:)?(\d{2})?$/.exec((horario || "").trim());
            resultado.setHours(Number(partes?.[1] || 0), Number(partes?.[2] || 0), 0, 0);
            return resultado;
        }

        function formatarDataCurta(data) {
            return `${String(data.getDate()).padStart(2, '0')}/${String(data.getMonth() + 1).padStart(2, '0')}`;
        }

        function formatarDiaSemana(data) {
            return data.toLocaleDateString('pt-BR', { weekday: 'long' });
        }

        formInscricao.onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btnTrocarConta.disabled = true;
            btn.innerText = "PROCESSANDO...";

            try {
                if (!formularioRef || !formularioAtual) throw new Error("LINK_EXPIRADO");
                const usuario = auth.currentUser;
                if (!usuarioGoogleValido(usuario)) throw new Error("LOGIN_NECESSARIO");
                const inscricaoRef = doc(collection(formularioRef, "inscricoes"));
                const nome = document.getElementById('iptNome').value.trim();
                const email = usuario.email;
                const autorUid = usuario.uid;
                await runTransaction(db, async transaction => {
                    const formularioSnap = await transaction.get(formularioRef);
                    if (!formularioSnap.exists() || !formularioSnap.data().vigente) throw new Error("LINK_EXPIRADO");
                    const formulario = formularioSnap.data();
                    if (!formulario.aberto) throw new Error("FORMULARIO_FECHADO");

                    const contadorInscricoes = Number(formulario.contadorInscricoes || 0) + 1;
                    const posicao = Number(formulario.ocupacaoInicial || 0) + contadorInscricoes + 1;
                    const status = posicao <= Number(formulario.limite || 0) ? "principal" : "espera";
                    const inscricaoId = inscricaoRef.id;

                    transaction.set(inscricaoRef, {
                        inscricaoId,
                        formularioToken: identificadorPublico,
                        listaId: formulario.listaId,
                        nome,
                        email,
                        posicao,
                        status,
                        autorUid,
                        criadoEm: serverTimestamp(),
                        sincronizada: false
                    });
                    transaction.update(formularioRef, {
                        contadorInscricoes,
                        ultimaInscricaoId: inscricaoId,
                        ultimaInscricaoUid: autorUid
                    });
                });

                document.getElementById('corpoForm').style.display = 'none';
                document.getElementById('successTitle').innerText = "Inscrição confirmada!";
                document.getElementById('successText').innerHTML = "Agradecemos sua inscrição 💖<br>Aguarde pelo lançamento da lista no grupo do WhatsApp.";
                document.getElementById('sucesso').style.display = 'block';
            } catch (err) {
                if (err.message === "LINK_EXPIRADO") {
                    renderLinkInvalido();
                } else if (err.message === "LOGIN_NECESSARIO") {
                    atualizarEstadoAutenticacao();
                    mostrarMensagemAuth("Entre novamente com o Google para concluir a inscrição.");
                } else if (err.message === "FORMULARIO_FECHADO") {
                    if (formularioAtual) renderForm({ ...formularioAtual, aberto: false });
                } else {
                    console.error("Erro ao salvar inscrição:", err);
                    alert("Erro ao salvar. Tente novamente.");
                }
                btn.disabled = false;
                btnTrocarConta.disabled = false;
                btn.innerText = "ENVIAR MINHA INSCRIÇÃO";
            }
        };
    </script>
</body>
</html>
