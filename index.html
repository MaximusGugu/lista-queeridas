<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lista Queeridas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏳️‍🌈</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-todes">
    <header class="header-compact">
        <div class="container row-between">
            <h1 id="tituloApp">LISTA</h1>
            <button id="btnConfig" class="btn-menu">⚙️</button>
        </div>
    </header>

    <main class="container">
        <nav class="nav-categorias" id="menuCategorias">
            <button class="btn-cat" data-id="TODES_QUARTA">QUARTA 🏳️‍🌈</button>
            <button class="btn-cat" data-id="TODES_SEXTA">SEXTA 🏳️‍🌈</button>
            <button class="btn-cat" data-id="ALLSTARS_QUARTA">QUARTA ⭐</button>
            <button class="btn-cat" data-id="ALLSTARS_SABADO">SÁBADO ⭐</button>
            <button class="btn-cat" data-id="ELAX_QUINTA">ELAX ✨</button>
            <button class="btn-cat" data-id="PRAIA_DOMINGO">PRAIA ☀️</button>
        </nav>

        <div id="infoPreview" class="info-card"></div>
        <div id="listaJogadores" class="list-container"></div>
        
        <div class="bottom-actions">
            <button id="btnOpenImport" class="btn btn-main">+ ADICIONAR LISTA</button>
            <div class="row-gap">
                <button id="btnClearAll" class="btn btn-sub danger">LIMPAR TUDO</button>
            </div>
        </div>
    </main>

    <div id="modalConfig" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3>Configurar Evento</h3>
            <div class="campo-modal">
                <label>Modalidade:</label>
                <select id="cfgModalidade" class="input-modal">
                    <option value="TODES_QUARTA">TODES (Quarta-feira)</option>
                    <option value="TODES_SEXTA">TODES (Sexta-feira)</option>
                    <option value="ALLSTARS_QUARTA">ALL STARS (Quarta-feira)</option>
                    <option value="ALLSTARS_SABADO">ALL STARS (Sábado)</option>
                    <option value="ELAX_QUINTA">ELAX (Quinta-feira)</option>
                    <option value="PRAIA_DOMINGO">PRAIA (Domingo)</option>
                </select>
            </div>
            <div class="campo-modal">
                <label>ADM do Dia:</label>
                <input type="text" id="cfgAdm" class="input-modal">
            </div>
            <div class="campo-modal"><label>Nome do Jogo:</label><input type="text" id="cfgNomeJogo" class="input-modal"></div>
            <div class="campo-modal"><label>📍 Local/Quadra:</label><input type="text" id="cfgQuadra" class="input-modal"></div>
            <div class="row-gap">
                <div>
                    <label>Data:</label>
                    <input type="text" id="cfgData" class="input-modal" placeholder="dd/mm">
                </div>
                <div>
                    <label>Dia:</label>
                    <select id="cfgDia" class="input-modal">
                        <option value="Segunda-Feira">Segunda-Feira</option>
                        <option value="Terça-Feira">Terça-Feira</option>
                        <option value="Quarta-Feira">Quarta-Feira</option>
                        <option value="Quinta-Feira">Quinta-Feira</option>
                        <option value="Sexta-Feira">Sexta-Feira</option>
                        <option value="Sábado">Sábado</option>
                        <option value="Domingo">Domingo</option>
                    </select>
                </div>
            </div>
            <div class="row-gap">
                <div><label>Início:</label><input type="text" id="cfgInicio" class="input-modal"></div>
                <div><label>Fim:</label><input type="text" id="cfgFim" class="input-modal"></div>
            </div>
            <div class="row-gap">
                <div><label>Valor R$:</label><input type="text" id="cfgValor" class="input-modal"></div>
                <div><label>Limite:</label><input type="number" id="cfgLimite" class="input-modal"></div>
            </div>
            <div class="campo-modal"><label>🔑 Chave Pix / Info Pagamento:</label><input type="text" id="cfgPix" class="input-modal"></div>
            <div class="modal-buttons">
                <button id="btnSalvarConfig" class="btn btn-main">SALVAR</button>
                <button class="btn btn-sub" onclick="fecharModal('modalConfig')">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="modalImport" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <h3>Colar Nomes</h3>
            <textarea id="textoNomesBulk" placeholder="João&#10;Maria..."></textarea>
            <div class="modal-buttons">
                <button id="btnConfirmarImport" class="btn btn-main">ADICIONAR</button>
                <button class="btn btn-sub" onclick="fecharModal('modalImport')">VOLTAR</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
