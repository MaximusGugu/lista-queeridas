<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/app-logo.png" />
    <title>Lista Queeridas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏳️‍🌈</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="standalone-navigation.js" defer></script>
</head>
<body class="theme-todes">
    <header class="header-compact">
        <div class="container row-between">
            <h1 id="tituloApp">LISTA</h1>
            <button id="btnConfig" class="btn-menu">⚙️</button>
        </div>
    </header>

    <main class="container">
        <nav class="nav-categorias" id="menuCategorias">
            <button class="btn-cat main-list-tab" data-id="TODES_QUARTA">QUARTA 🏳️‍🌈</button>
            <button class="btn-cat main-list-tab" data-id="TODES_SEXTA">SEXTA 🏳️‍🌈</button>
            <button class="btn-cat main-list-tab" data-id="ALLSTARS_QUARTA">QUARTA ⭐</button>
            <button class="btn-cat main-list-tab" data-id="ALLSTARS_SABADO">SÁBADO ⭐</button>
            <button class="btn-cat main-list-tab" data-id="ELAX_QUINTA">ELAX ✨</button>
            <button class="btn-cat main-list-tab" data-id="PRAIA_DOMINGO">PRAIA ☀️</button>
        </nav>

        <div id="infoPreview" class="info-card"></div>

        <div class="action-bar action-bar-primary">
            <button id="btnOpenImport" class="btn btn-main">+ ADICIONAR LISTA</button>
        </div>

        <!-- Spinner de Carregamento para a Lista -->
        <div id="loadingSpinner" class="spinner-container">
            <div class="spinner"></div>
            <p class="loading-text">BUSCANDO LISTA...</p>
        </div>

        <div id="listaJogadores" class="list-container"></div>
        
        <div class="action-bar-footer danger-zone">
            <button id="btnClearAll" class="btn btn-sub danger">LIMPAR TUDO</button>
        </div>
    </main>

    <!-- MODAL DE CONFIGURAÇÃO DO EVENTO -->
    <div id="modalConfig" class="modal-overlay" style="display:none;">
        <div class="modal-content modal-config-content">
            <h3>⚙️ Configurar Evento</h3>

            <!-- 1. SELETOR DE MODALIDADE NO TOPO PARA EVITAR CONFLITOS -->
            <div class="campo-modal">
                <label>Selecione a Lista que deseja editar:</label>
                <input type="hidden" id="cfgModalidade" value="TODES_QUARTA">
                <div class="nav-categorias config-list-selector" id="cfgModalidadeBotoes">
                    <button type="button" class="btn-cat cfg-list-option" data-id="TODES_QUARTA">QUARTA 🏳️‍🌈</button>
                    <button type="button" class="btn-cat cfg-list-option" data-id="TODES_SEXTA">SEXTA 🏳️‍🌈</button>
                    <button type="button" class="btn-cat cfg-list-option" data-id="ALLSTARS_QUARTA">QUARTA ⭐</button>
                    <button type="button" class="btn-cat cfg-list-option" data-id="ALLSTARS_SABADO">SÁBADO ⭐</button>
                    <button type="button" class="btn-cat cfg-list-option" data-id="ELAX_QUINTA">ELAX ✨</button>
                    <button type="button" class="btn-cat cfg-list-option" data-id="PRAIA_DOMINGO">PRAIA ☀️</button>
                </div>
            </div>
            
            <!-- CONTROLE DO FORMULÁRIO PÚBLICO -->
            <div class="campo-modal config-panel">
                <label>Status do Formulário Público:</label>
                <select id="cfgFormStatus" class="input-modal">
                    <option value="true">🔓 ABERTO (Permitir Inscrições)</option>
                    <option value="false">🔒 FECHADO (Bloquear Link)</option>
                </select>
                
                <label>Texto de Apoio (Aparece no formulário):</label>
                <textarea id="cfgTextoApoio" class="input-modal" placeholder="Descreva as regras ou informações do grupo..."></textarea>

                <div class="modal-grid config-panel-grid">
                    <div class="campo-modal">
                        <label>Dias antes que a lista abre:</label>
                        <input type="number" id="cfgAbreDiasAntes" class="input-modal" min="0" step="1">
                    </div>
                    <div class="campo-modal">
                        <label>Horário que a lista abre:</label>
                        <input type="text" id="cfgAbreHorario" class="input-modal" placeholder="12h30">
                    </div>
                </div>

                <label>Link do Grupo do WhatsApp:</label>
                <input type="text" id="cfgGrupoLink" class="input-modal" placeholder="Cole o link do grupo aqui">
            </div>

            <div class="modal-grid">
                <div class="campo-modal">
                    <label>ADM do Dia:</label>
                    <select id="cfgAdm" class="input-modal"></select>
                </div>

                <div class="campo-modal">
                    <label>Nome do Jogo:</label>
                    <input type="text" id="cfgNomeJogo" class="input-modal">
                </div>
            </div>
            
            <div class="modal-grid">
                <div class="campo-modal">
                    <label>📍 Local/Quadra:</label>
                    <input type="text" id="cfgQuadra" class="input-modal">
                </div>

                <!-- NOVO CAMPO: LINK DO GOOGLE MAPS -->
                <div class="campo-modal">
                    <label>🔗 Link Google Maps (Local):</label>
                    <input type="text" id="cfgMapaLink" class="input-modal" placeholder="Cole a URL do Maps aqui">
                </div>
            </div>

            <div class="row-gap">
                <div class="campo-modal">
                    <label>Data:</label>
                    <input type="text" id="cfgData" class="input-modal" placeholder="dd/mm">
                </div>
                <div class="campo-modal">
                    <label>Dia:</label>
                    <select id="cfgDia" class="input-modal">
                        <option value="Segunda-Feira">Segunda-Feira</option>
                        <option value="Terça-Feira">Terça-Feira</option>
                        <option value="Quarta-Feira">Quarta-Feira</option>
                        <option value="Quinta-Feira">Quinta-Feira</option>
                        <option value="Sexta-Feira">Sexta-Feira</option>
                        <option value="Sábado">Sábado</option>
                        <option value="Domingo">Domingo</option>
                    </select>
                </div>
            </div>

            <div class="row-gap">
                <div class="campo-modal">
                    <label>Início:</label>
                    <input type="text" id="cfgInicio" class="input-modal">
                </div>
                <div class="campo-modal">
                    <label>Fim:</label>
                    <input type="text" id="cfgFim" class="input-modal">
                </div>
            </div>

            <div class="row-gap">
                <div class="campo-modal">
                    <label>Valor R$:</label>
                    <input type="text" id="cfgValor" class="input-modal">
                </div>
                <div class="campo-modal">
                    <label>Limite:</label>
                    <input type="number" id="cfgLimite" class="input-modal">
                </div>
            </div>

            <div class="campo-modal">
                <label>🔑 Chave Pix / Info Pagamento:</label>
                <input type="text" id="cfgPix" class="input-modal">
            </div>
            
            <div class="modal-buttons">
                <button id="btnSalvarConfig" class="btn btn-main">SALVAR ALTERAÇÕES</button>
                <button class="btn btn-sub" onclick="fecharModal('modalConfig')">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE IMPORTAÇÃO MANUAL (COLAR LISTA) -->
    <div id="modalImport" class="modal-overlay" style="display:none;">
    <div class="modal-content modal-import-content">
        <h3>Importar Lista</h3>
        <textarea id="textoNomesBulk" class="import-textarea" placeholder="João&#10;Maria..."></textarea>
        <div class="modal-buttons">
            <button id="btnConfirmarImport" class="btn btn-main">ADICIONAR</button>
            <button class="btn btn-sub" onclick="fecharModal('modalImport')">VOLTAR</button>
        </div>
    </div>
</div>

    <script src="load-navbar.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
