<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <title>Login - Queeridas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏳️‍🌈</text></svg>">
    <script src="standalone-navigation.js" defer></script>
</head>
<body class="theme-allstars login-page">
    <div class="info-card login-card">
        <h2 class="login-title">QUEERIDAS 🏳️‍🌈</h2>
        <p class="login-subtitle">Acesso Restrito à Comunidade</p>
        
        <input type="email" id="email" class="input-modal mt-20" placeholder="E-mail">
        <input type="password" id="senha" class="input-modal mt-10" placeholder="Senha">
        
        <button id="btnLogin" class="btn btn-main btn-primary-todes mt-20">ENTRAR NO APP</button>
    </div>

    <script type="module">
        import { auth, signInWithEmailAndPassword } from "./firebase-config.js";
        document.getElementById("btnLogin").onclick = async () => {
            const e = document.getElementById("email").value;
            const s = document.getElementById("senha").value;
            try {
                await signInWithEmailAndPassword(auth, e, s);
                window.location.href = "index.html";
            } catch (err) { alert("Credenciais Inválidas"); }
        };
    </script>
</body>
</html>
