<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/MaximusGugu/lista-queeridas/refs/heads/main/apple-touch-icon.png" />
    <title>Login - Queeridas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/MaximusGugu/lista-queeridas/refs/heads/main/favicon.png" />
    <script src="standalone-navigation.js" defer></script>
</head>
<body class="theme-allstars login-page">
    <div class="info-card login-card">
        <h2 class="login-title">QUEERIDAS 🏳️‍🌈</h2>
        <p class="login-subtitle">Acesso Restrito à Comunidade</p>
        
        <button id="btnLoginGoogle" class="btn-google-login mt-20" type="button">
            <span class="google-mark" aria-hidden="true">G</span>
            <span>Entrar com Google</span>
        </button>
        <p id="loginMessage" class="login-message hidden" role="alert"></p>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
