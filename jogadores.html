<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Queeridas - Banco de Notas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏳️‍🌈</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajustes específicos para alinhar com a estética das outras telas */
        .player-actions { display: flex; gap: 10px; margin-bottom: 15px; }
        .player-actions .btn { flex: 1; padding: 10px; font-size: 11px; }
        
        #listaBanco { margin-top: 10px; }
        
        /* Estilização do formulário de adição para parecer o info-card */
        .add-form {
            background: white;
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 2px solid var(--color-allstars);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .back-link {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            text-decoration: none;
            color: white;
            font-size: 24px;
            font-weight: bold;
            z-index: 20;
        }

        .btn-edit { background: #E0F2FE; color: #0284C7; border: none; font-size: 14px; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .action-buttons { display: flex; gap: 6px; }

            /* CONTROLADOR MINI PARA A LISTA DO BANCO */
    .qty-controls.mini { 
        padding: 2px 5px; 
        gap: 4px; 
        border-radius: 6px; 
        background: rgba(0,0,0,0.03);
        margin-right: 5px;
        display: flex;
        align-items: center;
    }
    .qty-controls.mini .btn-qty { 
        width: 22px; 
        height: 22px; 
        font-size: 14px; 
        border-radius: 4px; 
        background: rgba(0,0,0,0.1);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .qty-controls.mini .level-num { 
        font-size: 13px; 
        min-width: 14px; 
        font-weight: 800;
        text-align: center;
        color: var(--secondary);
    }

    /* Garante que o nome não quebre e os botões fiquem alinhados */
    .item-compra {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 15px;
    }
    </style>
</head>
<body class="theme-allstars"> <!-- Usa o tema Roxo por padrão -->
    <header class="header-compact">
        <div class="container" style="display: flex; justify-content: center; position: relative;">
            <a href="times.html" class="back-link">‹</a>
            <h1 id="tituloApp">BANCO DE JOGADORES 📋</h1>
        </div>
    </header>

    <main class="container" style="margin-top: 20px;">
        
        <!-- BACKUP ACTIONS -->
        <div class="player-actions">
            <button class="btn btn-sub" onclick="exportarNotas()">📤 EXPORTAR NOTAS</button>
            <button class="btn btn-sub" onclick="document.getElementById('fileInput').click()">📥 IMPORTAR NOTAS</button>
            <input type="file" id="fileInput" style="display:none" onchange="importarNotas(event)">
        </div>

        <!-- FORMULÁRIO ADICIONAR (Estilo Info-Card) -->
        <div class="add-form">
            <div class="campo-modal">
                <label>Nome Completo ou Apelido:</label>
                <input type="text" id="addNome" class="input-modal" placeholder="Ex: Will Echeverria" style="margin-bottom: 15px;">
            </div>
            
            <div class="row-between" style="align-items: center; gap: 15px; margin-bottom: 15px;">
                <div class="qty-controls">
                    <button class="btn-qty" onclick="ajustarNovoNivel(-1)">-</button>
                    <span id="novoNivel" class="level-num">3</span>
                    <button class="btn-qty" onclick="ajustarNovoNivel(1)">+</button>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="addAllStars" style="width: 20px; height: 20px; cursor: pointer; margin: 0;">
                    <label for="addAllStars" style="margin: 0; font-size: 11px; font-weight: bold; color: var(--text-muted); cursor: pointer; text-transform: uppercase;">ALL STARS ⭐</label>
                </div>
            </div>
            
            <button class="btn btn-main" onclick="adicionarAoBanco()" style="width: 100%; background: var(--color-praia);">
                SALVAR NO BANCO
            </button>
        </div>

        <p class="label-instrucao">Jogadores Cadastrados:</p>
        <div id="listaBanco" class="list-container">
            <!-- Renderizado via JS -->
        </div>

    </main>

    <!-- MODAL EDITAR JOGADOR -->
    <div id="modalEditarJogador" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h3>Editar Jogador</h3>
        <div class="campo-modal">
            <label>Nome do Jogador (Chave):</label>
            <input type="text" id="editNome" class="input-modal">
        </div>

        <div class="campo-modal" style="margin-top: 15px;">
            <label>Apelidos / Como ele escreve (separe por vírgula):</label>
            <input type="text" id="editApelidos" class="input-modal" placeholder="Ex: Leo, Leozinho, Garcez">
        </div>
        
        <div class="campo-modal" style="margin-top: 15px;">
            <label>Nível (1 a 10) e Categoria:</label>
            <div class="row-between" style="align-items: center; gap: 15px;">
                <div class="qty-controls">
                    <button class="btn-qty" onclick="window.ajustarEditarNivel(-1)">-</button>
                    <span id="editNivel" class="level-num">3</span>
                    <button class="btn-qty" onclick="window.ajustarEditarNivel(1)">+</button>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="editAllStars" style="width: 20px; height: 20px; cursor: pointer; margin: 0;">
                    <label for="editAllStars" style="margin: 0; font-size: 11px; font-weight: bold; color: var(--text-muted); cursor: pointer; text-transform: uppercase;">ALL STARS ⭐</label>
                </div>
            </div>
        </div>
        
        <div class="modal-buttons" style="margin-top: 20px;">
            <button class="btn btn-main" onclick="window.salvarEdicaoJogador()" style="background: var(--color-praia);">SALVAR ALTERAÇÕES</button>
            <button class="btn btn-sub" onclick="window.fecharModalEditar()">CANCELAR</button>
        </div>
    </div>
</div>

    <script type="module" src="jogadores.js"></script>

    <script src="load-navbar.js"></script>
</body>
</html>
