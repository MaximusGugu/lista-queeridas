<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/MaximusGugu/lista-queeridas/refs/heads/main/apple-touch-icon.png" />
    <title>Queeridas - Banco de Notas</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/MaximusGugu/lista-queeridas/refs/heads/main/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="standalone-navigation.js" defer></script>
</head>
<body class="theme-allstars">
    <header class="header-compact">
        <div class="container center-header">
            <h1 id="tituloApp">BANCO DE JOGADORES 📋</h1>
        </div>
    </header>

    <main class="container page-main-spaced">
        <details class="add-form add-player-accordion">
            <summary class="add-player-summary">
                <span>Adicionar nova pessoa</span>
                <span class="add-player-summary-icon">+</span>
            </summary>
            <div class="add-player-body">
                <div class="campo-modal">
                    <label>Nome Completo:</label>
                    <input type="text" id="addNome" class="input-modal field-spaced" placeholder="Gustavo José">
                </div>

                <div class="campo-modal">
                    <label>Apelidos / Como ele escreve:</label>
                    <input type="text" id="addApelidos" class="input-modal field-spaced" placeholder="Ex: Gustavo S, Gugu">
                </div>

                <div class="notas-grid-cadastro add-rating-grid">
                    <div class="nota-input-group rating-modality">
                        <label class="rating-modality-label"><input type="checkbox" id="addTodes" class="checkbox-control" checked onchange="toggleModalidadeBanco('add', 'todes', this.checked)"> Todes</label>
                        <div class="qty-controls rating-stepper">
                            <button type="button" class="btn-qty" onclick="ajustarNotaManual('addNotaTodes', -1)">-</button>
                            <span id="addNotaTodes" class="level-num">3</span>
                            <button type="button" class="btn-qty" onclick="ajustarNotaManual('addNotaTodes', 1)">+</button>
                        </div>
                    </div>
                    <div class="nota-input-group rating-modality is-disabled">
                        <label class="rating-modality-label"><input type="checkbox" id="addElax" class="checkbox-control" onchange="toggleModalidadeBanco('add', 'elax', this.checked)"> Elax</label>
                        <div class="qty-controls rating-stepper">
                            <button type="button" class="btn-qty" disabled onclick="ajustarNotaManual('addNotaElax', -1)">-</button>
                            <span id="addNotaElax" class="level-num">0</span>
                            <button type="button" class="btn-qty" disabled onclick="ajustarNotaManual('addNotaElax', 1)">+</button>
                        </div>
                    </div>
                    <div class="nota-input-group rating-modality is-disabled" id="groupAddAllStars">
                        <label class="rating-modality-label"><input type="checkbox" id="addAllStars" class="checkbox-control" onchange="toggleModalidadeBanco('add', 'allStars', this.checked)"> All Stars ⭐</label>
                        <div class="qty-controls rating-stepper">
                            <button type="button" class="btn-qty" disabled onclick="ajustarNotaManual('addNotaAllStars', -1)">-</button>
                            <span id="addNotaAllStars" class="level-num">0</span>
                            <button type="button" class="btn-qty" disabled onclick="ajustarNotaManual('addNotaAllStars', 1)">+</button>
                        </div>
                    </div>
                </div>

                <button class="btn btn-main btn-primary-praia btn-full" onclick="adicionarAoBanco()">
                    SALVAR NO BANCO
                </button>
            </div>
        </details>

        <p class="label-instrucao">Jogadores Cadastrados:</p>
        <div class="campo-modal search-box">
            <input type="search" id="buscaBanco" class="input-modal" placeholder="Buscar por nome ou apelido...">
        </div>

        <div class="nota-selector bank-filter-tabs" id="filtroBancoNotas">
            <div class="nota-option active" data-filtro="todos">Exibir tudo</div>
            <div class="nota-option" data-filtro="todes">Todes</div>
            <div class="nota-option" data-filtro="allstars">All Stars</div>
            <div class="nota-option" data-filtro="elax">Elax</div>
        </div>

        <div id="listaBanco" class="list-container bank-list">
            <div id="loadingSpinner" class="spinner-container">
                <div class="spinner"></div>
                <p class="loading-text">CARREGANDO BANCO...</p>
            </div>
        </div>

        <div class="action-bar action-bar-secondary player-actions bank-maintenance-actions">
            <button class="btn btn-sub" onclick="exportarNotas()">📤 EXPORTAR NOTAS</button>
            <button class="btn btn-sub" onclick="document.getElementById('fileInput').click()">📥 IMPORTAR NOTAS</button>
            <input type="file" id="fileInput" class="hidden" onchange="importarNotas(event)">
        </div>
    </main>

    <script type="module" src="jogadores.js"></script>
    <script type="module" src="load-navbar.js"></script>
</body>
</html>
